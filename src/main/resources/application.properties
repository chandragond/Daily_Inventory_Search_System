# Application name
spring.application.name=Flipkart_Daily_Inventory_Search_System

# Database configuration (Replace <your_database> with actual DB name)
spring.datasource.url=jdbc:mysql://localhost:3306/flipkart_inventory_db
spring.datasource.username=root
spring.datasource.password=test
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server port
server.port=8080
